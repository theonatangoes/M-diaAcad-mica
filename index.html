<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniFAP | Simulador de Média Acadêmica</title>

  <link rel="shortcut icon" href="FAVICON CALC.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #004571;
      --accent: #E30613;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(0, 69, 113, 0.5) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(227, 6, 19, 0.2) 0px, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      color: #fff;
    }

    .top-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .top-logo img {
      width: 180px;
      mix-blend-mode: screen;
      filter: brightness(1.2);
    }

    .calculadoras-wrapper {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 960px;
      align-items: flex-start;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex: 1;
      padding: 36px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .divider {
      width: 1px;
      align-self: stretch;
      background: rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.05rem;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    .input-section {
      margin-bottom: 18px;
      text-align: left;
    }

    .label-group {
      font-size: 0.78rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 11px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--primary);
    }

    input.input-error {
      border-color: #ef4444 !important;
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-calc {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-calc:hover {
      background: #005a94;
      transform: scale(1.02);
    }

    .btn-avp2-action {
      background: #92400e;
    }

    .btn-avp2-action:hover {
      background: #b45309;
      transform: scale(1.02);
    }

    /* ── Modais ── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    @keyframes popIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-content {
      background: #fff;
      color: #1e293b;
      width: 90%;
      max-width: 400px;
      padding: 35px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-content i {
      font-size: 3.5rem;
      margin-bottom: 15px;
    }

    .res-media {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--primary);
      margin: 5px 0;
    }

    .status-badge {
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.9rem;
      margin-bottom: 15px;
      display: block;
    }

    .avf-info {
      background: #fef3c7;
      padding: 15px;
      border-radius: 15px;
      color: #92400e;
      font-size: 0.9rem;
      margin-top: 15px;
      border: 1px solid #fde68a;
    }

    .btn-close {
      margin-top: 25px;
      padding: 12px 25px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
    }

    /* Modal AVP2 */
    .modal-avp2-content {
      background: #fff;
      color: #1e293b;
      width: 90%;
      max-width: 400px;
      padding: 35px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .avp2-header-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .avp2-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .avp2-nota {
      font-size: 4rem;
      font-weight: 900;
      margin: 4px 0 2px;
    }

    .avp2-sublabel {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 16px;
    }

    .cenario-box {
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .cenario-box.aprovado {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .cenario-box.avf {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .cenario-box.reprovado {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .cenario-box i {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .impossivel-box {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 14px;
      padding: 14px;
      color: #991b1b;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .btn-avp2-close {
      margin-top: 22px;
      padding: 12px 25px;
      background: #b45309;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      font-size: 0.95rem;
      transition: 0.2s;
    }

    .btn-avp2-close:hover {
      background: #92400e;
    }

    /* Modal erro */
    .modal-erro-content {
      background: #fff;
      color: #1e293b;
      width: 90%;
      max-width: 360px;
      padding: 35px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-erro-content i {
      font-size: 3rem;
      color: #ef4444;
      margin-bottom: 12px;
      display: block;
    }

    .modal-erro-content h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #dc2626;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .modal-erro-content p {
      font-size: 0.95rem;
      color: #475569;
      line-height: 1.5;
    }

    .btn-erro-close {
      margin-top: 22px;
      padding: 12px 25px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      font-size: 0.95rem;
      transition: 0.2s;
    }

    .btn-erro-close:hover {
      background: #dc2626;
    }

    .footer {
      margin-top: 24px;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.5px;
      text-align: center;
    }

    .footer a {
      color: #E30613;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 700px) {
      .calculadoras-wrapper {
        flex-direction: column;
      }

      .divider {
        width: 100%;
        height: 1px;
        align-self: auto;
      }
    }
  </style>
</head>

<body>

  <div class="top-logo">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRc-V3qzqoyjqzv6-AmwTlzZmoc3D02Az1-9g&s" alt="UniFAP">
  </div>

  <div class="calculadoras-wrapper">

    <!-- ═══ CALCULADORA 1 — MÉDIA FINAL ═══ -->
    <div class="container">
      <h1>
        <i class="fas fa-graduation-cap" style="color:#60a5fa; margin-right:6px;"></i>
        Simulador de Média Acadêmica
      </h1>

      <div class="input-section">
        <div class="label-group"><i class="fas fa-edit"></i> PROVAS AVP</div>
        <div class="grid">
          <input type="number" id="avp1" placeholder="AVP 1" step="0.1" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="avp2" placeholder="AVP 2" step="0.1" min="0" max="10" oninput="validarInput(this)">
        </div>
      </div>

      <div class="input-section">
        <div class="label-group"><i class="fas fa-tasks"></i> TRABALHOS TDE</div>
        <div class="grid">
          <input type="number" id="tde1" placeholder="TDE 1" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="tde2" placeholder="TDE 2" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="tde3" placeholder="TDE 3" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="tde4" placeholder="TDE 4" min="0" max="10" oninput="validarInput(this)">
        </div>
      </div>

      <button class="btn-calc" onclick="calcular()">
        <i class="fas fa-calculator"></i> CALCULAR MÉDIA
      </button>
    </div>

    <div class="divider"></div>

    <!-- ═══ CALCULADORA 2 — NOTA MÍNIMA AVP2 ═══ -->
    <div class="container">
      <h1>
        <i class="fas fa-search" style="color:#fbbf24; margin-right:6px;"></i>
        Quanto Preciso Tirar na AVP2?
      </h1>

      <div class="input-section">
        <div class="label-group"><i class="fas fa-edit"></i> PROVA AVP 1</div>
        <div class="grid-1">
          <input type="number" id="avp1b" placeholder="AVP 1" step="0.1" min="0" max="10" oninput="validarInput(this)">
        </div>
      </div>

      <div class="input-section">
        <div class="label-group"><i class="fas fa-tasks"></i> TRABALHOS TDE</div>
        <div class="grid">
          <input type="number" id="tde1b" placeholder="TDE 1" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="tde2b" placeholder="TDE 2" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="tde3b" placeholder="TDE 3" min="0" max="10" oninput="validarInput(this)">
          <input type="number" id="tde4b" placeholder="TDE 4" min="0" max="10" oninput="validarInput(this)">
        </div>
      </div>

      <button class="btn-calc btn-avp2-action" onclick="saberNotaAVP2()">
        <i class="fas fa-search"></i> QUANTO PRECISO TIRAR NA AVP2
      </button>
    </div>

  </div>

  <div class="footer">
    Desenvolvido por <a href="https://theonatan.vercel.app" target="_blank">Theo Natan</a>
  </div>


  <!-- ═══ MODAIS ═══ -->

  <!-- Modal resultado média -->
  <div class="modal-overlay" id="overlay" onclick="fecharModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="modal-icon"></div>
      <span style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Média Final</span>
      <div class="res-media" id="modal-nota">0.0</div>
      <span class="status-badge" id="modal-status">Status</span>
      <div id="avp-necessaria" class="avf-info" style="display:none;">
        <p id="avf-text"></p>
      </div>
      <button class="btn-close" onclick="fecharModal()">VOLTAR</button>
    </div>
  </div>

  <!-- Modal nota mínima AVP2 -->
  <div class="modal-overlay" id="overlayAVP2" onclick="fecharModalAVP2()">
    <div class="modal-avp2-content" onclick="event.stopPropagation()">
      <div id="avp2-icon" class="avp2-header-icon"></div>
      <span class="avp2-label">Nota mínima na AVP 2</span>
      <div class="avp2-nota" id="avp2-nota-min">—</div>
      <div class="avp2-sublabel" id="avp2-sublabel"></div>
      <div id="avp2-cenarios"></div>
      <button class="btn-avp2-close" onclick="fecharModalAVP2()">ENTENDIDO</button>
    </div>
  </div>

  <!-- Modal erro -->
  <div class="modal-overlay" id="overlayErro" onclick="fecharModalErro()">
    <div class="modal-erro-content" onclick="event.stopPropagation()">
      <i class="fas fa-exclamation-triangle"></i>
      <h2>Nota Inválida</h2>
      <p>As notas devem ser números entre <strong>0</strong> e <strong>10</strong>.<br>Por favor, corrija os campos destacados em vermelho.</p>
      <button class="btn-erro-close" onclick="fecharModalErro()">ENTENDIDO</button>
    </div>
  </div>


  <script>
    /* ─── Helpers ─── */
    function validarInput(el) {
      const val = parseFloat(el.value);
      if (el.value !== '' && (isNaN(val) || val < 0 || val > 10)) {
        el.classList.add('input-error');
      } else {
        el.classList.remove('input-error');
      }
    }

    // Arredonda para 0.5 mais próximo: 4.2→4.0 | 4.3→4.5 | 4.8→5.0
    function arredondar(v) {
      return Math.round(v * 2) / 2;
    }

    function somaTDE(sufixo) {
      const g = id => parseFloat(document.getElementById(id + sufixo).value) || 0;
      return (g('tde1') + g('tde2') + g('tde3') + g('tde4')) / 10 * 0.5 * 4
        - (g('tde1') + g('tde2') + g('tde3') + g('tde4')) / 10 * 0.5 * 4
        + [g('tde1'), g('tde2'), g('tde3'), g('tde4')].reduce((s, n) => s + (n / 10) * 0.5, 0);
    }

    function validarCampos(ids) {
      let erro = false;
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const v = parseFloat(el.value);
        if (el.value !== '' && (isNaN(v) || v < 0 || v > 10)) {
          el.classList.add('input-error');
          erro = true;
        }
      });
      return erro;
    }

    /* ─── CALCULADORA 1 — MÉDIA FINAL ─── */
    function calcular() {
      if (validarCampos(['avp1', 'avp2', 'tde1', 'tde2', 'tde3', 'tde4'])) {
        document.getElementById('overlayErro').style.display = 'flex';
        return;
      }
      const g = id => parseFloat(document.getElementById(id).value) || 0;
      const media = arredondar(g('avp1') * 0.4 + g('avp2') * 0.4 + somaTDE(''));
      mostrarResultado(media);
    }

    function mostrarResultado(media) {
      document.getElementById('modal-nota').innerText = media.toFixed(1);
      const avfDiv = document.getElementById('avp-necessaria');
      const avfText = document.getElementById('avf-text');
      const icon = document.getElementById('modal-icon');
      const status = document.getElementById('modal-status');
      avfDiv.style.display = 'none';

      if (media >= 7) {
        icon.innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;"></i>';
        status.innerText = 'Aprovado Direto';
        status.style.color = '#059669';
      } else if (media >= 4) {
        icon.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#f59e0b;"></i>';
        status.innerText = 'Avaliação Final (AVF)';
        status.style.color = '#d97706';
        const nec = Math.ceil((10 - media) * 2) / 2;
        avfDiv.style.display = 'block';
        avfText.innerHTML = `Para passar na AVF, você precisa tirar no mínimo:<br><b style="font-size:1.4rem;">${nec.toFixed(1)}</b>`;
      } else {
        icon.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
        status.innerText = 'Reprovado Direto';
        status.style.color = '#dc2626';
      }
      document.getElementById('overlay').style.display = 'flex';
    }

    /* ─── CALCULADORA 2 — NOTA MÍNIMA NA AVP2 ─── */
    function saberNotaAVP2() {
      if (validarCampos(['avp1b', 'tde1b', 'tde2b', 'tde3b', 'tde4b'])) {
        document.getElementById('overlayErro').style.display = 'flex';
        return;
      }

      const avp1 = parseFloat(document.getElementById('avp1b').value) || 0;
      const fixo = avp1 * 0.4 + somaTDE('b');
      const avp2Exata = (7 - fixo) / 0.4;

      const iconDiv = document.getElementById('avp2-icon');
      const notaDiv = document.getElementById('avp2-nota-min');
      const subDiv = document.getElementById('avp2-sublabel');
      const cenDiv = document.getElementById('avp2-cenarios');
      cenDiv.innerHTML = '';

      /* Caso 1: já passa com 0 */
      if (avp2Exata <= 0) {
        iconDiv.innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;"></i>';
        notaDiv.style.color = '#059669';
        notaDiv.innerText = '0.0';
        subDiv.innerText = 'para aprovação direta';
        subDiv.style.color = '#059669';
        cenDiv.innerHTML = `
          <div class="cenario-box aprovado">
            <i class="fas fa-check-circle"></i>
            <span>Você já está aprovado direto mesmo com 0 na AVP2! 🎉</span>
          </div>`;

        /* Caso 2: impossível */
      } else if (avp2Exata > 10) {
        const mediaMax = arredondar(fixo + 10 * 0.4);
        iconDiv.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
        notaDiv.style.color = '#dc2626';
        notaDiv.innerText = '—';
        subDiv.innerText = 'impossível passar direto';
        subDiv.style.color = '#dc2626';

        if (mediaMax >= 4) {
          const nec = Math.ceil((10 - mediaMax) * 2) / 2;
          cenDiv.innerHTML = `
            <div class="impossivel-box">
              <i class="fas fa-info-circle"></i>&nbsp;
              Não é possível passar direto com nenhuma nota na AVP2.
            </div>
            <div class="cenario-box avf" style="margin-top:10px;">
              <i class="fas fa-exclamation-circle"></i>
              <span>Com <b>10.0</b> na AVP2 sua média seria <b>${mediaMax.toFixed(1)}</b> → Vai para <b>AVF</b> (mín. <b>${nec.toFixed(1)}</b>)</span>
            </div>`;
        } else {
          cenDiv.innerHTML = `
            <div class="impossivel-box">
              <i class="fas fa-info-circle"></i>&nbsp;
              Mesmo com 10 na AVP2 a média seria <b>${mediaMax.toFixed(1)}</b> → Reprovado Direto.
            </div>`;
        }

        /* Caso 3: nota entre 0 e 10 */
      } else {
        // Começa do piso em 0.5 e sobe só se necessário
        let nota = Math.floor(avp2Exata * 2) / 2;
        if (nota < 0) nota = 0;
        let mediaMin = arredondar(fixo + nota * 0.4);
        while (mediaMin < 7 && nota <= 10) {
          nota += 0.5;
          mediaMin = arredondar(fixo + nota * 0.4);
        }
        if (nota > 10) nota = 10;

        iconDiv.innerHTML = '<i class="fas fa-bullseye" style="color:#f59e0b;"></i>';
        notaDiv.style.color = '#d97706';
        notaDiv.innerText = nota.toFixed(1);
        subDiv.innerText = 'para aprovação direta (média ≥ 7.0)';
        subDiv.style.color = '#64748b';

        const notaAbaixo = Math.max(0, nota - 0.5);
        const mediaAbaixo = arredondar(fixo + notaAbaixo * 0.4);

        let html = `
          <div class="cenario-box aprovado">
            <i class="fas fa-check-circle"></i>
            <span>Com <b>${nota.toFixed(1)}</b> ou mais na AVP2 → Aprovado Direto ✅</span>
          </div>`;

        if (mediaAbaixo >= 4) {
          const nec = Math.ceil((10 - mediaAbaixo) * 2) / 2;
          html += `
            <div class="cenario-box avf">
              <i class="fas fa-exclamation-circle"></i>
              <span>Com menos → Avaliação Final (AVF), precisando de mín. <b>${nec.toFixed(1)}</b></span>
            </div>`;
        } else {
          html += `
            <div class="cenario-box reprovado">
              <i class="fas fa-times-circle"></i>
              <span>Com menos → Risco de <b>Reprovação Direta</b></span>
            </div>`;
        }
        cenDiv.innerHTML = html;
      }

      document.getElementById('overlayAVP2').style.display = 'flex';
    }

    /* ─── Fechar modais ─── */
